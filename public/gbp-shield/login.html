<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client Login — Crownpoint Local</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav-wrap">
        <a href="/gbp-shield/" class="brand">
          <img class="logo-emblem" src="/gbp-shield/logo-crownpoint.svg" alt="Crownpoint Local logo" />
          <div>
            <strong>Crownpoint Local</strong>
            <small>Client Portal</small>
          </div>
        </a>
        <div class="nav-actions">
          <a href="/gbp-shield/signup.html" class="btn primary">Create Account</a>
        </div>
      </div>
    </header>

    <section class="page-hero">
      <div class="container">
        <h1>Client login</h1>
        <p>Access your weekly KPI updates, action plan, and competitor notes.</p>
      </div>
    </section>

    <section class="page-content">
      <div class="container narrow">
        <article class="page-card">
          <h3>Log in to your portal</h3>
          <form id="login-form" class="stack">
            <label>Email<input required type="email" name="email" /></label>
            <button class="btn primary" type="submit">Open Dashboard</button>
          </form>
          <p id="login-status" class="muted"></p>
        </article>
      </div>
    </section>

    <footer class="footer">
      <div class="container footer-row">
        <p>© <span id="year"></span> Crownpoint Local</p>
        <nav>
          <a href="/gbp-shield/">Home</a>
          <a href="/gbp-shield/contact.html">Contact</a>
          <a href="/gbp-shield/signup.html">Sign Up</a>
        </nav>
      </div>
    </footer>

    <script src="./login.js"></script>
  </body>
</html>
