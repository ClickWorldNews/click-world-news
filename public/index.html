<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Click World News</title>
    <meta name="theme-color" content="#06080d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Freestyle globe-first world news experience." />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260411ab" />
  </head>
  <body>
    <div id="app">
      <div id="globe"></div>

      <header class="glass topbar">
        <div class="brand-wrap">
          <span class="brand-orb"></span>
          <div>
            <h1>Click World News</h1>
            <p>Aether Luxe</p>
          </div>
        </div>
        <button id="open-search" class="icon-btn" aria-label="Open search">⌕</button>
      </header>

      <section class="hud">
        <div id="region-pill" class="glass pill">Region: World</div>
        <div id="meta-pill" class="glass pill sub">Tap globe to drop signal</div>
      </section>

      <button id="ping-btn" class="glass ping-btn" type="button">Signal</button>

      <footer class="glass bottomdock">
        <button id="labels-btn" class="dock-btn">Labels On</button>
        <button id="news-btn" class="dock-btn primary">Open News</button>
        <button id="world-btn" class="dock-btn">World View</button>
      </footer>
    </div>

    <section id="feed-sheet" class="sheet hidden" aria-hidden="true">
      <div class="sheet-bar"></div>
      <div class="sheet-head">
        <h2 id="feed-title">World Headlines</h2>
        <div class="sheet-actions">
          <button id="refresh-feed" class="sheet-btn">Refresh</button>
          <button id="close-feed" class="sheet-btn">Close</button>
        </div>
      </div>
      <div id="feed-loading" class="feed-loading hidden">Loading signal...</div>
      <ul id="feed-list" class="feed-list"></ul>
    </section>

    <section id="search-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
        <div class="modal-head">
          <h3>Find a place</h3>
          <button id="close-search" class="sheet-btn">Close</button>
        </div>
        <div class="search-row">
          <input id="search-input" placeholder="City, state, or country" />
          <button id="search-go" class="sheet-btn">Go</button>
        </div>
        <div id="search-results" class="search-results"></div>
      </div>
    </section>

    <script src="/vendor/globe.gl.min.js?v=20260411ab"></script>
    <script defer src="app.js?v=20260411ab"></script>
  </body>
</html>
